name: Publish Cluster Manager image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - server.js
      - his-catalog.js
      - his-manager.js
      - ceph-manager.js
      - his-values/**
      - package.json
      - package-lock.json
      - src/**
      - test/**
      - ui-shell/**
      - module-package.json
      - module-package.json.sig
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: package
        shell: bash
        run: |
          echo "descriptor=$(cat module-package.json)" >> "$GITHUB_OUTPUT"
          echo "signature=$(tr -d '\r\n' < module-package.json.sig)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/opensphere-platform/opensphere-shell-cluster-manager:sha-${{ github.sha }}
          build-args: |
            OS_MODULE_DESCRIPTOR=${{ steps.package.outputs.descriptor }}
            OS_MODULE_SIGNATURE=${{ steps.package.outputs.signature }}
      - uses: imjasonh/setup-crane@v0.4
      - name: Publish immutable KST release tag and advance edge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          crane auth login ghcr.io -u "${{ github.actor }}" -p "$GH_TOKEN"
          repository=ghcr.io/opensphere-platform/opensphere-shell-cluster-manager
          release_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          release_tag="$(TZ=Asia/Seoul date -d "@$release_epoch" +%Y%m%d%H%M)"
          [[ "$release_tag" =~ ^[0-9]{12}$ ]]
          existing="$(crane digest "$repository:$release_tag" 2>/dev/null || true)"
          if [[ -n "$existing" && "$existing" != "$DIGEST" ]]; then
            echo "Immutable release tag collision: $repository:$release_tag is $existing, expected $DIGEST" >&2
            exit 1
          fi
          crane tag "$repository@$DIGEST" "$release_tag"
          test "$(crane digest "$repository:$release_tag")" = "$DIGEST"
          crane tag "$repository@$DIGEST" edge
          test "$(crane digest "$repository:edge")" = "$DIGEST"
          echo "- \`$repository:$release_tag\` → \`$DIGEST\`" >> "$GITHUB_STEP_SUMMARY"
