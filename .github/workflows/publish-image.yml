name: Publish Cluster Manager image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - src/**
      - ui-shell/**
      - module-package.json
      - module-package.json.sig
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: package
        shell: bash
        run: |
          echo "descriptor=$(cat module-package.json)" >> "$GITHUB_OUTPUT"
          echo "signature=$(tr -d '\r\n' < module-package.json.sig)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/opensphere-platform/opensphere-shell-cluster-manager:1.0.0
            ghcr.io/opensphere-platform/opensphere-shell-cluster-manager:stable
          build-args: |
            OS_MODULE_DESCRIPTOR=${{ steps.package.outputs.descriptor }}
            OS_MODULE_SIGNATURE=${{ steps.package.outputs.signature }}
