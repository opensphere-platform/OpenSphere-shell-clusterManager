apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    opensphere.io/owner: signed-platform-release
---
apiVersion: v1
kind: Namespace
metadata:
  name: opensphere-ceph-imports
  labels:
    opensphere.io/owner: cluster-manager
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-ceph-runtime-owner
  namespace: rook-ceph
rules:
  - apiGroups: [""]
    resources: [secrets, configmaps]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [ceph.rook.io]
    resources: [cephclusters]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-ceph-runtime-owner
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-ceph-runtime-owner
subjects:
  - kind: ServiceAccount
    name: opensphere-cluster-manager
    namespace: opensphere-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opensphere-ceph-import-owner
  namespace: opensphere-ceph-imports
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opensphere-ceph-import-owner
  namespace: opensphere-ceph-imports
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opensphere-ceph-import-owner
subjects:
  - kind: ServiceAccount
    name: opensphere-cluster-manager
    namespace: opensphere-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensphere-ceph-consumer-storage-owner
rules:
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [snapshot.storage.k8s.io]
    resources: [volumesnapshotclasses]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensphere-ceph-consumer-storage-owner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opensphere-ceph-consumer-storage-owner
subjects:
  - kind: ServiceAccount
    name: opensphere-cluster-manager
    namespace: opensphere-console
