# 참고용 설치 결과. 실제 설치 정본은 OCI 이미지의 서명된 module-package.json이며 os extensions install이 이 CR을 생성한다.
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: cluster-manager
  namespace: opensphere-console
  labels:
    opensphere.io/source: oci
spec:
  kind: subShell
  hostRef: main
  hostApiVersion: "1.0.0"
  hostCompat: ">=1.0.0 <2.0.0"
  serviceAccountName: opensphere-cluster-manager
  displayName: "Cluster Manager"
  owner: opensphere-platform
  version: 1.3.3
  description: "OpenSphere Kubernetes, external Ceph Storage, and HIS management views"
  image:
    repository: ghcr.io/opensphere-platform/opensphere-shell-cluster-manager
    digest: sha256:ef4d1492349dd6d81faa27eb04e1dfeb7ec79a3213e99d86e05b49ad08804e66
  nav:
    band: "운영 Operate"
    label: "Cluster Manager"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "8bd3e16e3812f131e4d57e4b271362d7ddec6f6e5d8e57fcf229adb56e9e3d7c"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissionProfile: cluster-infrastructure-manager-v1
  runtime:
    port: 8080
    healthPath: /healthz
    serviceAccountName: opensphere-cluster-manager
    resources: { cpuRequest: 50m, memoryRequest: 128Mi, cpuLimit: 500m, memoryLimit: 512Mi }
  permissions:
    - page:register
    - api:proxy
  api:
    basePath: /api/plugins/cluster-manager
  contributions:
    page: { enabled: true }
    navigation: { enabled: false, mode: "none", reason: "Cluster Manager owns navigation inside its page" }
    api: { enabled: true, basePath: "/api/plugins/cluster-manager" }
    cli: { enabled: false, reason: "Cluster Manager CLI manifest is not published" }
    manual: { enabled: false, mode: "none", reason: "Cluster Manager Manual contribution is not published" }
    search: { enabled: false, mode: "none", reason: "Cluster Manager search contribution is not published" }
    notification: { enabled: false, frontend: false, backend: false, reason: "Cluster Manager notification contribution is not published" }
    observability: { enabled: false, logs: false, metrics: false, traces: false, reason: "Cluster Manager observability contract is not published" }
